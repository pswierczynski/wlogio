<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekran powitalny — Wlogio</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }

        .avatar-btn {
            transition: transform 0.2s ease;
            background: none; border: none; padding: 0;
        }
        .avatar-btn:hover { transform: scale(1.06); }
        .avatar-btn:active { transform: scale(0.96); }

        /* Siatka - max 4 kolumny, responsywna */
        .users-grid {
            display: grid;
            gap: 2rem;
            justify-items: center;
        }
        @media (max-width: 479px)  { .users-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 480px)  { .users-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 640px)  { .users-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 860px)  { .users-grid { grid-template-columns: repeat(4, 1fr); } }

        /* Ograniczenie siatki do rzeczywistej liczby użytkowników */
        .users-grid.count-1 { grid-template-columns: 1fr; max-width: 160px; }
        .users-grid.count-2 { grid-template-columns: repeat(2, 1fr); max-width: 340px; }
        .users-grid.count-3 { grid-template-columns: repeat(3, 1fr); max-width: 520px; }

        /* Statusy - obramowania */
        .avatar-ring {
            border-radius: 50%;
            transition: box-shadow 0.4s ease, opacity 0.4s ease;
        }
        .ring-working { box-shadow: 0 0 0 4px #22c55e; }  /* success */
        .ring-break   { box-shadow: 0 0 0 4px #f59e0b; }  /* warning */
        .ring-idle    { box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }

        /* Wygaszenie */
        .dim-idle     { opacity: 0.5; }
        .dim-active   { opacity: 1; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.35s ease forwards; }
        .animate-fade-in  { animation: fadeIn 0.25s ease forwards; }

        /* PIN */
        .pin-digit {
            width: 60px; height: 70px; font-size: 2rem; font-weight: 700;
            border: 2px solid oklch(var(--bc)/0.2); border-radius: 12px;
            background: oklch(var(--b2));
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, background 0.2s;
        }
        .pin-digit.filled  { background: oklch(var(--p)/0.1); border-color: oklch(var(--p)); }
        .pin-digit.active  { border-color: oklch(var(--p)); background: oklch(var(--b1)); }
        .pin-digit.error   { border-color: oklch(var(--er)); background: oklch(var(--er)/0.1);
                             animation: shake 0.4s ease; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-8px); }
            75%      { transform: translateX(8px); }
        }

        /* Przyciski zegara */
        .clock-btn {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 8px;
            font-size: 0.85rem; font-weight: 600;
            transition: all 0.2s ease; border: 3px solid transparent;
        }
        .clock-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
        .clock-btn:not(:disabled):hover  { transform: scale(1.05); }
        .clock-btn:not(:disabled):active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gradient-to-br from-base-200 to-base-300 min-h-screen">

<!-- Inicjalne statusy z backendu -->
<script>
    const INITIAL_STATUSES = {{ user_statuses | tojson }};
</script>

<div x-data="welcomeApp()" x-init="init()" class="min-h-screen flex flex-col">

    <!-- Nagłówek -->
    <div class="flex items-center justify-between px-6 py-4 shrink-0">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="font-bold text-lg">wlogio</span>
        </div>
        <div class="text-right">
            <div class="text-sm font-medium" x-text="currentTime"></div>
            <div class="text-xs text-base-content/50" x-text="currentDate"></div>
        </div>
    </div>

    <!-- Ekran 1: Siatka avatarów -->
    <div x-show="screen === 'avatars'" x-cloak
         class="flex-1 flex flex-col items-center justify-center p-6 overflow-y-auto animate-fade-in">

        <h1 class="text-3xl font-bold mb-1 text-center">Dzień dobry!</h1>
        <p class="text-base-content/50 text-sm mb-8 text-center">Wybierz swój profil</p>

        <div class="users-grid w-full max-w-4xl mx-auto
            {% set n = users|length %}
            {% if n == 1 %}count-1{% elif n == 2 %}count-2{% elif n == 3 %}count-3{% endif %}">

            {% for user in users %}
            {% set uid = user.id|string %}
            <button class="avatar-btn flex flex-col items-center gap-3"
                    @click="selectUser({{ user.id }}, {{ (user.name or user.email.split('@')[0])|tojson }}, {{ (user.avatar or '')|tojson }})">

                <!-- Avatar z reaktywnym obramowaniem -->
                <div class="avatar-ring w-28 h-28 shrink-0 overflow-hidden"
                     :class="{
                         'ring-working dim-active': statuses['{{ uid }}'] === 'working',
                         'ring-break dim-active':   statuses['{{ uid }}'] === 'break',
                         'ring-idle dim-idle':      statuses['{{ uid }}'] === 'idle' || !statuses['{{ uid }}']
                     }">
                    {% if user.avatar %}
                    <img src="{{ user.avatar }}" alt="{{ user.name or user.email }}"
                         class="w-full h-full object-cover" loading="lazy"/>
                    {% else %}
                    <!-- Brak avatara - szare kółko z inicjałami -->
                    <div class="w-full h-full bg-neutral flex items-center justify-center">
                        <span class="text-3xl font-bold text-white select-none">
                            {% set parts = (user.name or user.email.split('@')[0]).split(' ') %}
                            {{ parts[0][0].upper() }}{% if parts|length > 1 %}{{ parts[1][0].upper() }}{% endif %}
                        </span>
                    </div>
                    {% endif %}
                </div>

                <!-- Imię na dwa wiersze -->
                <div class="text-xs font-medium text-center leading-snug text-base-content/80 max-w-[120px]">
                    {% set parts = (user.name or user.email.split('@')[0]).split(' ') %}
                    <div>{{ parts[0] }}</div>
                    {% if parts|length > 1 %}<div>{{ parts[1:] | join(' ') }}</div>{% endif %}
                </div>
            </button>
            {% endfor %}

        </div>

        {% if not users %}
        <div class="text-center text-base-content/40 mt-8">
            <p class="mb-2">Brak użytkowników</p>
        </div>
        {% endif %}

        <a href="{{ url_for('auth.login') }}"
           class="mt-10 btn btn-ghost btn-sm text-base-content/30">
            ← Wróć do logowania
        </a>
    </div>

    <!-- Ekran 2: PIN -->
    <div x-show="screen === 'pin'" x-cloak
         class="flex-1 flex flex-col items-center justify-center p-8 animate-slide-up">

        <div class="avatar-ring w-20 h-20 mb-6 overflow-hidden"
             :class="selectedAvatar ? 'ring-idle' : 'ring-idle'">
            <template x-if="selectedAvatar">
                <img :src="selectedAvatar" class="w-full h-full object-cover"/>
            </template>
            <template x-if="!selectedAvatar">
                <div class="w-full h-full bg-neutral flex items-center justify-center">
                    <span class="text-xl font-bold text-white"
                          x-text="getInitials(selectedName)"></span>
                </div>
            </template>
        </div>

        <h2 class="text-xl font-bold mb-1" x-text="selectedName"></h2>
        <p class="text-base-content/60 text-sm mb-8">Wpisz swój PIN (4 cyfry)</p>

        <div class="flex gap-3 mb-8">
            <template x-for="i in 4" :key="i">
                <div class="pin-digit"
                     :class="{ filled: pin.length >= i, active: pin.length === i-1, error: pinError }">
                    <span x-text="pin.length >= i ? '•' : ''"></span>
                </div>
            </template>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <template x-for="key in ['1','2','3','4','5','6','7','8','9','','0','⌫']" :key="key">
                <button @click="pressKey(key)"
                        :disabled="key === ''"
                        class="btn btn-ghost text-xl font-bold h-14 w-14 rounded-xl"
                        :class="key === '' ? 'opacity-0 pointer-events-none' : 'hover:bg-base-300'">
                    <span x-text="key"></span>
                </button>
            </template>
        </div>

        <div x-show="pinError" x-cloak class="text-error text-sm mb-4 animate-fade-in">
            Nieprawidłowy PIN.
        </div>

        <button @click="screen = 'avatars'; pin = ''; pinError = false"
                class="btn btn-ghost btn-sm text-base-content/40">← Wróć</button>
    </div>

    <!-- Ekran 3: Przyciski czasu pracy -->
    <div x-show="screen === 'clock'" x-cloak
         class="flex-1 flex flex-col items-center justify-center p-8 animate-slide-up">

        <div class="avatar-ring w-16 h-16 mb-4 overflow-hidden"
             :class="{
                 'ring-working dim-active': clockStatus === 'working',
                 'ring-break dim-active':   clockStatus === 'break',
                 'ring-idle dim-idle':      clockStatus === 'idle'
             }">
            <template x-if="selectedAvatar">
                <img :src="selectedAvatar" class="w-full h-full object-cover"/>
            </template>
            <template x-if="!selectedAvatar">
                <div class="w-full h-full bg-neutral flex items-center justify-center">
                    <span class="text-xl font-bold text-white" x-text="getInitials(selectedName)"></span>
                </div>
            </template>
        </div>

        <h2 class="text-xl font-bold mb-1" x-text="selectedName"></h2>
        <p class="text-base-content/60 text-sm mb-8" x-text="clockDate"></p>

        <div class="flex flex-wrap gap-8 justify-center mb-8">

            <!-- Przyjście / Wyjście -->
            <div class="flex flex-col items-center gap-3">
                <button @click="clockAction('clock_in')" :disabled="!!clockIn"
                        x-show="!clockIn" class="clock-btn bg-success text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Przyjście
                </button>
                <button @click="clockAction('clock_out')" :disabled="!clockIn || !!clockOut"
                        x-show="clockIn" class="clock-btn bg-error text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Wyjście
                </button>
                <div class="text-sm text-center leading-relaxed">
                    <span x-show="clockIn" x-text="'Przyjście: ' + clockIn" class="text-success block"></span>
                    <span x-show="clockOut" x-text="'Wyjście: ' + clockOut" class="text-error block"></span>
                </div>
            </div>

            <!-- Przerwa -->
            <div class="flex flex-col items-center gap-3">
                <button @click="clockAction('break_start')"
                        :disabled="!clockIn || !!breakStart || !!clockOut"
                        x-show="!breakStart" class="clock-btn bg-warning text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Przerwa
                </button>
                <button @click="clockAction('break_end')" :disabled="!breakStart || !!breakEnd"
                        x-show="breakStart" class="clock-btn bg-info text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Koniec przerwy
                </button>
                <div class="text-sm text-center leading-relaxed text-warning">
                    <span x-show="breakStart" x-text="'Przerwa od: ' + breakStart" class="block"></span>
                    <span x-show="breakEnd" x-text="'do: ' + breakEnd" class="block"></span>
                </div>
            </div>

        </div>

        <div x-show="lastAction" x-cloak class="alert alert-success mb-6 py-2 px-4 text-sm" x-transition>
            <span x-text="lastAction"></span>
        </div>

        <button @click="logout()" class="btn btn-ghost btn-sm text-base-content/40">Gotowe →</button>
    </div>

</div>

<script>
function welcomeApp() {
    return {
        screen: 'avatars',
        statuses: {...INITIAL_STATUSES},  // reaktywne statusy
        selectedUserId: null,
        selectedName: '',
        selectedAvatar: '',
        pin: '',
        pinError: false,
        clockIn: null, clockOut: null, breakStart: null, breakEnd: null,
        clockDate: '', clockStatus: 'idle',
        lastAction: '',
        currentTime: '', currentDate: '',
        pollInterval: null,

        init() {
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            // Polling statusów co 10 sekund
            this.pollInterval = setInterval(() => this.fetchStatuses(), 10000);
        },

        updateClock() {
            const now = new Date();
            this.currentTime = now.toLocaleTimeString('pl-PL', {hour: '2-digit', minute: '2-digit'});
            this.currentDate = now.toLocaleDateString('pl-PL', {weekday: 'long', day: 'numeric', month: 'long'});
        },

        async fetchStatuses() {
            try {
                const r = await fetch('/welcome/statuses');
                if (r.ok) {
                    const data = await r.json();
                    this.statuses = data;
                    // Aktualizuj też status na ekranie zegarowym
                    if (this.selectedUserId && this.screen === 'clock') {
                        this.clockStatus = data[String(this.selectedUserId)] || 'idle';
                    }
                }
            } catch (e) { /* ignoruj błędy sieciowe */ }
        },

        getInitials(name) {
            const parts = (name || '').trim().split(' ');
            if (parts.length >= 2) return parts[0][0].toUpperCase() + parts[1][0].toUpperCase();
            return (parts[0][0] || '?').toUpperCase();
        },

        selectUser(userId, name, avatar) {
            this.selectedUserId = userId;
            this.selectedName = name;
            this.selectedAvatar = avatar;
            this.pin = '';
            this.pinError = false;
            this.screen = 'pin';
        },

        pressKey(key) {
            if (key === '⌫') {
                this.pin = this.pin.slice(0, -1);
                this.pinError = false;
            } else if (key && this.pin.length < 4) {
                this.pin += key;
                if (this.pin.length === 4) this.verifyPin();
            }
        },

        async verifyPin() {
            const r = await fetch('/welcome/verify-pin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: this.selectedUserId, pin: this.pin})
            });

            if (r.ok) {
                const data = await r.json();
                this.clockIn = data.clock_in;
                this.clockOut = data.clock_out;
                this.breakStart = data.break_start;
                this.breakEnd = data.break_end;
                this.clockDate = data.date;
                this.clockStatus = this.statuses[String(this.selectedUserId)] || 'idle';
                this.screen = 'clock';
            } else {
                this.pinError = true;
                setTimeout(() => { this.pin = ''; this.pinError = false; }, 1000);
            }
        },

        async clockAction(action) {
            const r = await fetch('/welcome/clock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: this.selectedUserId, pin: this.pin, action})
            });

            const data = await r.json();
            if (data.ok) {
                this.clockIn = data.clock_in;
                this.clockOut = data.clock_out;
                this.breakStart = data.break_start;
                this.breakEnd = data.break_end;
                this.lastAction = data.label;
                setTimeout(() => this.lastAction = '', 3000);
                // Natychmiast odśwież statusy po akcji
                await this.fetchStatuses();
                this.clockStatus = this.statuses[String(this.selectedUserId)] || 'idle';
            }
        },

        logout() {
            this.screen = 'avatars';
            this.selectedUserId = null;
            this.pin = '';
            this.clockIn = null; this.clockOut = null;
            this.breakStart = null; this.breakEnd = null;
            this.lastAction = '';
            this.clockStatus = 'idle';
            this.fetchStatuses(); // Odśwież po wylogowaniu
        }
    }
}
</script>

</body>
</html>
