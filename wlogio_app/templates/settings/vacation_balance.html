{% extends "base.html" %}
{% block title %}Bilans urlopowy{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('settings.index') }}" class="btn btn-ghost btn-sm">← Wróć</a>
        <h1 class="text-xl font-bold">Bilans urlopowy</h1>
    </div>

    <div class="card bg-base-100 shadow-sm">
        <div class="card-body gap-5">

            <div class="alert alert-info text-sm">
                Pule są roczne i resetują się z dniem 1 stycznia.
                Niewykorzystane urlopy przenoszą się na następny rok.
                Urlop na żądanie pomniejsza też pulę urlopów zwykłych.
            </div>

            <form method="POST" class="flex flex-col gap-5">

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Pula urlopu wypoczynkowego (dni)</span>
                    </label>
                    <input type="number" name="vacation_total" min="0" max="365" required
                           value="{{ balance.vacation_total }}"
                           class="input input-bordered w-40"/>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Pula urlopu na żądanie (dni)</span>
                    </label>
                    <input type="number" name="on_demand_total" min="0" max="365" required
                           value="{{ balance.on_demand_total }}"
                           class="input input-bordered w-40"/>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Pula dni pracy zdalnej</span>
                    </label>
                    <input type="number" name="remote_total" min="0" max="365" required
                           value="{{ balance.remote_total }}"
                           class="input input-bordered w-40"/>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" class="btn btn-primary flex-1">Zapisz</button>
                    <a href="{{ url_for('settings.index') }}" class="btn btn-ghost">Anuluj</a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
