<div x-data="{
    rangeType: 'vacation',
    dateFrom: '',
    dateTo: '',
    preview: null,
    loading: false,
    error: null,
    confirmed: false,
    remainingVacation: {{ remaining_vacation }},

    async fetchPreview() {
        if (!this.dateFrom || !this.dateTo) {
            this.preview = null;
            this.error = null;
            this.confirmed = false;
            return;
        }
        this.loading = true;
        this.preview = null;
        this.error = null;
        this.confirmed = false;
        try {
            const r = await fetch('{{ url_for('entries.range_preview') }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    date_from: this.dateFrom,
                    date_to: this.dateTo,
                    range_type: this.rangeType,
                })
            });
            const data = await r.json();
            if (data.ok) {
                this.preview = data;
            } else {
                this.error = data.error;
            }
        } catch(e) {
            this.error = 'Błąd połączenia z serwerem.';
        }
        this.loading = false;
    },

    typeLabel(type) {
        return type === 'vacation' ? 'Urlop' : 'Bezpłatny';
    },

    typeBadgeClass(type) {
        return type === 'vacation' ? 'badge-info' : 'badge-neutral';
    }
}">

    <!-- Typ zakresu -->
    <div class="form-control">
        <label class="label"><span class="label-text font-medium">Typ urlopu</span></label>
        <div class="flex gap-2">
            <label class="cursor-pointer">
                <input type="radio" class="sr-only" x-model="rangeType" value="vacation"
                       @change="fetchPreview()">
                <span class="btn btn-sm" :class="rangeType === 'vacation' ? 'btn-primary' : 'btn-ghost'">
                    Urlop wypoczynkowy
                </span>
            </label>
            <label class="cursor-pointer">
                <input type="radio" class="sr-only" x-model="rangeType" value="unpaid"
                       @change="fetchPreview()">
                <span class="btn btn-sm" :class="rangeType === 'unpaid' ? 'btn-primary' : 'btn-ghost'">
                    Urlop bezpłatny
                </span>
            </label>
        </div>
    </div>

    <!-- Info o dostępnych urlopach -->
    <div x-show="rangeType === 'vacation'" class="alert py-2 text-sm bg-base-200 border-base-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-base-content/50" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-base-content/60">
            Dostępnych urlopów: <strong x-text="remainingVacation"></strong> dni.
            Nadmiar zostanie wstawiony jako urlop bezpłatny.
        </span>
    </div>

    <!-- Daty -->
    <div class="grid grid-cols-2 gap-4">
        <div class="form-control">
            <label class="label"><span class="label-text font-medium">Od</span></label>
            <input type="date" x-model="dateFrom"
                   @change="fetchPreview()"
                   class="input input-bordered w-full"/>
        </div>
        <div class="form-control">
            <label class="label"><span class="label-text font-medium">Do</span></label>
            <input type="date" x-model="dateTo"
                   @change="fetchPreview()"
                   class="input input-bordered w-full"/>
        </div>
    </div>

    <!-- Ładowanie -->
    <div x-show="loading" class="flex items-center gap-2 text-sm text-base-content/50">
        <span class="loading loading-spinner loading-sm"></span>
        Sprawdzam zakres…
    </div>

    <!-- Błąd -->
    <div x-show="error" x-cloak class="alert alert-error py-3 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span x-text="error"></span>
    </div>

    <!-- Podgląd -->
    <div x-show="preview" x-cloak class="flex flex-col gap-3">

        <!-- Podsumowanie -->
        <div class="alert py-3 text-sm"
             :class="preview && preview.unpaid_days > 0 && rangeType === 'vacation' ? 'alert-warning' : 'alert-success'">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div>
                <div>
                    Łącznie <strong x-text="preview && preview.total_days"></strong> dni roboczych.
                </div>
                <template x-if="preview && rangeType === 'vacation'">
                    <div class="mt-1">
                        <span x-show="preview.vacation_days > 0">
                            <strong x-text="preview.vacation_days"></strong> dni urlopu
                        </span>
                        <span x-show="preview.unpaid_days > 0 && preview.vacation_days > 0"> + </span>
                        <span x-show="preview.unpaid_days > 0" class="text-warning font-medium">
                            <strong x-text="preview.unpaid_days"></strong> dni bezpłatnych
                            (przekroczono dostępną pulę)
                        </span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Lista dni -->
        <div class="border border-base-200 rounded-xl overflow-hidden">
            <div class="bg-base-200/60 px-4 py-2 text-xs font-semibold text-base-content/50 uppercase tracking-wide">
                Szczegóły dni
            </div>
            <div class="max-h-56 overflow-y-auto divide-y divide-base-200">
                <template x-for="day in (preview ? preview.days : [])" :key="day.date">
                    <div class="flex items-center justify-between px-4 py-2 text-sm">
                        <span x-text="day.date" class="font-medium"></span>
                        <span class="badge badge-sm"
                              :class="day.type === 'vacation' ? 'badge-info' : 'badge-neutral'"
                              x-text="day.type === 'vacation' ? 'Urlop' : 'Bezpłatny'"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Potwierdzenie -->
        <label class="flex items-center gap-3 cursor-pointer select-none">
            <input type="checkbox" class="checkbox checkbox-primary" x-model="confirmed"/>
            <span class="text-sm">Potwierdzam i chcę dodać powyższe dni</span>
        </label>

        <!-- Formularz zapisu -->
        <form method="POST" action="{{ url_for('entries.add_range') }}"
              @submit.prevent="confirmed && $el.submit()">
            <input type="hidden" name="date_from" :value="dateFrom"/>
            <input type="hidden" name="date_to"   :value="dateTo"/>
            <input type="hidden" name="range_type" :value="rangeType"/>

            <div class="form-control mb-4">
                <label class="label">
                    <span class="label-text font-medium">Notatki</span>
                    <span class="label-text-alt text-base-content/40">opcjonalne — dodane do każdego dnia</span>
                </label>
                <textarea name="notes" rows="2"
                          class="textarea textarea-bordered w-full resize-none"
                          placeholder="Dodatkowe informacje..."></textarea>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        :disabled="!confirmed"
                        class="btn btn-primary flex-1"
                        :class="!confirmed ? 'btn-disabled' : ''">
                    Dodaj <span x-text="preview ? preview.total_days : ''"></span> dni
                </button>
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-ghost">Anuluj</a>
            </div>
        </form>

    </div>

</div>
