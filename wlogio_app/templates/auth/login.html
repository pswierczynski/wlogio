<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie — Wlogio</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-base-200 min-h-screen flex flex-col items-center justify-center p-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-[calc(100vw-2rem)]">
        {% for category, message in messages %}
        <div x-data="{ show: true }" x-show="show" x-cloak
             x-init="setTimeout(() => show = false, 4000)"
             class="alert {% if category == 'error' %}alert-error{% elif category == 'success' %}alert-success{% else %}alert-info{% endif %} shadow-lg">
            <span class="text-sm">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="card bg-base-100 shadow-xl w-full max-w-md">
        <div class="card-body gap-6 p-6 sm:p-8">
            <div class="text-center">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="text-2xl font-bold tracking-tight">wlogio</span>
                </div>
                <p class="text-base-content/60 text-sm">Rejestr czasu pracy</p>
            </div>

            <form method="POST" class="flex flex-col gap-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Adres email</span></label>
                    <input type="email" name="email" required autocomplete="email"
                           class="input input-bordered w-full" placeholder="twoj@email.com"/>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Hasło</span></label>
                    <input type="password" name="password" required autocomplete="current-password"
                           class="input input-bordered w-full" placeholder="••••••••"/>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="remember" class="checkbox checkbox-primary checkbox-sm"/>
                    <span class="text-sm">Zapamiętaj mnie</span>
                </div>
                <button type="submit" class="btn btn-primary w-full">Zaloguj się</button>
            </form>

            <div class="divider text-xs text-base-content/40">lub</div>

            <div class="text-center text-sm">
                Nie masz konta?
                <a href="{{ url_for('auth.register') }}" class="link link-primary font-medium">
                    Zarejestruj się
                </a>
            </div>
        </div>
    </div>

</body>
</html>
